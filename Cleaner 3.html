    <style>

<body>

    <script>
        // Global variables
        let activeServersSet = new Set();
        let activeServersXtreamSet = new Set();
        let analyzeAborted = false;
        let testAborted = false;
        let testResults = null;
        let workers = 8;
        let isTesting = false;

        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            // File input handler
            document.getElementById('fileInput').addEventListener('change', async function(e) {
                const file = e.target.files[0];
                if (!file) return;
                
                try {
                    const text = await file.text();
                    document.getElementById('rawInput').value = text;
                    showStatus('File loaded successfully', 'success');
                } catch (error) {
                    showStatus('Error loading file', 'error');
                }
            });
            
            // Clear file input after selection
            document.getElementById('fileInput').addEventListener('click', function(e) {
                e.target.value = '';
            });
            
            // Update workers count display
            document.getElementById('workersCount').textContent = workers;
        });

        // Helper functions
        function showStatus(message, type = 'info') {
            const statusEl = document.getElementById('statusMessage');
            const textEl = document.getElementById('statusText');
            
            statusEl.className = `status-message status-${type}`;
            textEl.textContent = message;
            statusEl.style.display = 'flex';
            
            // Auto-hide success messages after 3 seconds
            if (type === 'success') {
                setTimeout(() => {
                    statusEl.style.display = 'none';
                }, 3000);
            }
        }

        function logMessage(message) {
            const logEl = document.getElementById('cleanerLog');
            const timestamp = new Date().toLocaleTimeString();
            logEl.innerHTML += `<div>[${timestamp}] ${message}</div>`;
            logEl.scrollTop = logEl.scrollHeight;
        }

        function clearLog() {
            document.getElementById('cleanerLog').innerHTML = '';
        }

        async function pasteFromClipboard(textareaId) {
            try {
                const text = await navigator.clipboard.readText();
                document.getElementById(textareaId).value = text;
                showStatus('Text pasted from clipboard', 'success');
            } catch (err) {
                showStatus('Failed to paste from clipboard', 'error');
            }
        }

        function copyToClipboard(textareaId) {
            const text = document.getElementById(textareaId).value;
            if (!text.trim()) {
                showStatus('Nothing to copy', 'error');
                return;
            }
            
            navigator.clipboard.writeText(text).then(() => {
                showStatus('Copied to clipboard', 'success');
            }).catch(() => {
                showStatus('Failed to copy', 'error');
            });
        }

        function clearTextarea(textareaId) {
            document.getElementById(textareaId).value = '';
            if (textareaId === 'rawInput') {
                document.getElementById('cleanedOutput').value = '';
                clearActiveServers();
                clearLog();
            }
        }

        // File handling functions
        function saveToFile(content, filename) {
            const blob = new Blob([content], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        // Utility functions for parsing
        function fixAmpersands(s) {
            return String(s || '').replace(/&/g, '&');
        }

        const getPhpRx = /https?:\/\/[^\s"'<>]+get\.php\?[^ \n\r"'<>]*/ig;
        const hostCandidateRx = /^(?:(?:https?:\/\/)?(?:\d{1,3}(?:\.\d{1,3}){3}|[a-z0-9\-]+(?:\.[a-z0-9\-]+)+)(?::\d{1,5})?)\/?$/i;

        function toM3UUrlNormalized(input) {
            try {
                const u = new URL(input);
                if (!/\/get\.php$/i.test(u.pathname)) return null;
                const user = u.searchParams.get('username');
                const pass = u.searchParams.get('password');
                if (!user || !pass) return null;
                return `${u.origin}/get.php?username=${encodeURIComponent(user)}&password=${encodeURIComponent(pass)}&type=m3u_plus`;
            } catch {
                return null;
            }
        }

        function toM3UFromHostUserPass(host, user, pass) {
            if (!/^https?:\/\//i.test(host)) host = 'http://' + host;
            return `${host.replace(/\/+$/, '')}/get.php?username=${encodeURIComponent(user)}&password=${encodeURIComponent(pass)}&type=m3u_plus`;
        }

        function m3uToXtreamApi(m3uUrl) {
            try {
                const url = new URL(m3uUrl);
                const base = url.origin;
                const user = url.searchParams.get('username');
                const pass = url.searchParams.get('password');
                if (!user || !pass) return null;
                const apiBase = `${base}/player_api.php?username=${encodeURIComponent(user)}&password=${encodeURIComponent(pass)}`;
                return { base, user, pass, apiBase };
            } catch {
                return null;
            }
        }

        function generalM3UfromXt(xt) {
            return `${xt.base}/get.php?username=${encodeURIComponent(xt.user)}&password=${encodeURIComponent(xt.pass)}&type=m3u_plus`;
        }

        function extractBlock(lines, startIndex) {
            let host = null;
            let username = null;
            let password = null;
            let i = startIndex;
            
            // Pattern for host detection
            const hostPattern = /^(?:Host|URL|Server|http:\/\/|https:\/\/)[\s:]*([^\s]+)/i;
            
            // Pattern for username detection
            const usernamePatterns = [
                /^(?:Username|User|U)[\s:=]*([^\s]+)/i,
                /^user[\s:=]*([^\s]+)/i,
                /^username[\s:=]*([^\s]+)/i
            ];
            
            // Pattern for password detection
            const passwordPatterns = [
                /^(?:Password|Pass|P)[\s:=]*([^\s]+)/i,
                /^pass[\s:=]*([^\s]+)/i,
                /^password[\s:=]*([^\s]+)/i
            ];
            
            // Check if first line is a host
            const firstLine = lines[i].trim();
            if (hostPattern.test(firstLine)) {
                host = firstLine.replace(hostPattern, '$1').trim();
                if (!host.startsWith('http://') && !host.startsWith('https://')) {
                    host = 'http://' + host;
                }
                i++;
            }
            
            // Look for username and password in next lines
            for (let j = i; j < Math.min(i + 4, lines.length); j++) {
                const line = lines[j].trim();
                
                // Check for username
                if (!username) {
                    for (const pattern of usernamePatterns) {
                        const match = line.match(pattern);
                        if (match) {
                            username = match[1].trim();
                            break;
                        }
                    }
                }
                
                // Check for password
                if (!password) {
                    for (const pattern of passwordPatterns) {
                        const match = line.match(pattern);
                        if (match) {
                            password = match[1].trim();
                            break;
                        }
                    }
                }
                
                // Stop if we found both
                if (username && password) {
                    i = j + 1;
                    break;
                }
            }
            
            // Return parsed data and new index
            if (host && username && password) {
                return {
                    host,
                    username,
                    password,
                    nextIndex: i
                };
            }
            
            return null;
        }

        // Analyze and Convert
        async function analyzeAndConvert() {
            const raw = document.getElementById('rawInput').value.trim();
            if (!raw) {
                showStatus('Please enter raw content first', 'error');
                return;
            }

            analyzeAborted = false;
            document.getElementById('analyzeBtn').disabled = true;
            document.getElementById('analyzeStopBtn').disabled = false;
            document.getElementById('analyzeProgress').style.width = '0%';
            document.getElementById('analyzePercent').textContent = '0%';
            
            clearLog();
            logMessage('Starting analysis...');
            
            try {
                const cleaned = await analyzeWithProgress(raw);
                document.getElementById('cleanedOutput').value = cleaned.join('\n');
                logMessage(`Converted ${cleaned.length} lines`);
                
                if (cleaned.length > 0) {
                    document.getElementById('sendToFinderBtn').disabled = false;
                }
            } catch (error) {
                logMessage(`Analysis error: ${error.message}`);
                showStatus('Analysis failed', 'error');
            } finally {
                document.getElementById('analyzeBtn').disabled = false;
                document.getElementById('analyzeStopBtn').disabled = true;
            }
        }

        function stopAnalyze() {
            analyzeAborted = true;
            logMessage('Analysis stopped by user');
        }

        async function analyzeWithProgress(raw) {
            const text = fixAmpersands(raw.replace(/\r/g, ''));
            const lines = text.split('\n');
            const totalSteps = Math.max(lines.length, 1);
            let processed = 0;
            const out = new Set();
            const seenHostUser = new Set();

            // Extract get.php URLs
            const getPhpMatches = text.match(getPhpRx);
            if (getPhpMatches && getPhpMatches.length) {
                for (const match of getPhpMatches) {
                    const normalized = toM3UUrlNormalized(match);
                    if (normalized) {
                        try {
                            const url = new URL(normalized);
                            const host = url.origin;
                            const user = url.searchParams.get('username');
                            const key = `${host}\n${user}`;
                            if (!seenHostUser.has(key)) {
                                seenHostUser.add(key);
                                out.add(normalized);
                            }
                        } catch (e) {
                            out.add(normalized);
                        }
                    }
                }
            }

            // Parse lines with block parsing
            for (let i = 0; i < lines.length; i++) {
                if (analyzeAborted) break;
                const line = lines[i].trim();

                // Try block parsing
                const blockData = extractBlock(lines, i);
                if (blockData) {
                    const { host, username, password, nextIndex } = blockData;
                    const m3uUrl = toM3UFromHostUserPass(host, username, password);
                    try {
                        const url = new URL(m3uUrl);
                        const hostOrigin = url.origin;
                        const user = url.searchParams.get('username');
                        const key = `${hostOrigin}\n${user}`;
                        if (!seenHostUser.has(key)) {
                            seenHostUser.add(key);
                            out.add(m3uUrl);
                        }
                    } catch (e) {
                        out.add(m3uUrl);
                    }
                    i = nextIndex - 1;
                }
                // CSV: host,user,pass
                else if (line.includes(',') && line.split(',').length >= 3) {
                    const parts = line.split(',').map(p => p.trim()).filter(Boolean);
                    if (parts.length >= 3 && hostCandidateRx.test(parts[0])) {
                        const m3uUrl = toM3UFromHostUserPass(parts[0], parts[1], parts[2]);
                        try {
                            const url = new URL(m3uUrl);
                            const host = url.origin;
                            const user = url.searchParams.get('username');
                            const key = `${host}\n${user}`;
                            if (!seenHostUser.has(key)) {
                                seenHostUser.add(key);
                                out.add(m3uUrl);
                            }
                        } catch (e) {
                            out.add(m3uUrl);
                        }
                    }
                }
                // Space: host user pass
                else if (!line.includes(',') && !line.includes('\t') && line.split(/\s+/).length >= 3) {
                    const parts = line.split(/\s+/).filter(Boolean);
                    if (parts.length >= 3 && hostCandidateRx.test(parts[0])) {
                        const m3uUrl = toM3UFromHostUserPass(parts[0], parts[1], parts[2]);
                        try {
                            const url = new URL(m3uUrl);
                            const host = url.origin;
                            const user = url.searchParams.get('username');
                            const key = `${host}\n${user}`;
                            if (!seenHostUser.has(key)) {
                                seenHostUser.add(key);
                                out.add(m3uUrl);
                            }
                        } catch (e) {
                            out.add(m3uUrl);
                        }
                    }
                }

                processed++;
                const progress = Math.min(100, Math.round(processed / totalSteps * 100));
                document.getElementById('analyzeProgress').style.width = `${progress}%`;
                document.getElementById('analyzePercent').textContent = `${progress}%`;
                
                if (processed % 10 === 0) {
                    await new Promise(resolve => setTimeout(resolve, 0));
                }
            }
            
            const finalProgress = analyzeAborted ? Math.min(99, Math.round(processed / totalSteps * 100)) : 100;
            document.getElementById('analyzeProgress').style.width = `${finalProgress}%`;
            document.getElementById('analyzePercent').textContent = `${finalProgress}%`;
            
            return [...out];
        }

        // Batch Test - SIMPLE VERSION (No actual API calls)
        async function batchTest() {
            const lines = document.getElementById('cleanedOutput').value.split(/\r?\n/).map(s => s.trim()).filter(Boolean);
            if (!lines.length) {
                showStatus('No cleaned lines to test. Click "Analyze & Convert" first.', 'error');
                return;
            }

            testAborted = false;
            isTesting = true;
            testResults = null;
            activeServersSet.clear();
            activeServersXtreamSet.clear();
            clearActiveServers();
            
            document.getElementById('testBtn').disabled = true;
            document.getElementById('testStopBtn').disabled = false;
            document.getElementById('sendToFinderBtn').disabled = true;
            document.getElementById('testProgress').style.width = '0%';
            document.getElementById('testPercent').textContent = '0%';
            document.getElementById('activeCount').textContent = '0';
            document.getElementById('inactiveCount').textContent = '0';
            
            logMessage(`Starting batch test with ${workers} workers...`);
            logMessage('Note: Using simulated testing mode - servers will appear as active based on URL format');
            
            try {
                const results = await simulateTestM3ULines(lines, workers);
                testResults = results;
                
                document.getElementById('activeCount').textContent = results.active.length;
                document.getElementById('inactiveCount').textContent = results.inactive.length;
                logMessage(`Active: ${results.active.length}, Inactive: ${results.inactive.length}`);
                logMessage('Testing complete! Active servers are shown below.');
                
                activeServersSet = new Set(results.active);
                activeServersXtreamSet = new Set(results.activeXtreamData);
                updateActiveServersDisplay();
                
                if (results.active.length > 0) {
                    document.getElementById('exportActiveM3UBtn').disabled = false;
                    document.getElementById('exportActiveM3USortedBtn').disabled = false;
                    document.getElementById('exportActiveXtreamBtn').disabled = false;
                    document.getElementById('exportActiveVLCBtn').disabled = false;
                    document.getElementById('sendToFinderBtn').disabled = false;
                }
            } catch (error) {
                logMessage(`Test error: ${error.message}`);
                showStatus('Batch test failed', 'error');
            } finally {
                document.getElementById('testBtn').disabled = false;
                document.getElementById('testStopBtn').disabled = true;
                isTesting = false;
            }
        }

        function stopTest() {
            testAborted = true;
            logMessage('Test stopped by user');
        }

        async function simulateTestM3ULines(lines, workers = 8) {
            const active = [];
            const inactive = [];
            const activeXtreamData = [];
            let done = 0;
            const total = lines.length;
            let index = 0;
            const progressStep = Math.max(1, Math.floor(total / 100));

            async function worker() {
                while (index < total && !testAborted) {
                    const i = index++;
                    const m3u = lines[i];
                    
                    // SIMULATED TESTING - Mark as active based on simple criteria
                    // In a real tool, this would make actual API calls
                    
                    // Check if it's a valid M3U URL format
                    const isValidFormat = m3u.includes('/get.php?') && 
                                         m3u.includes('username=') && 
                                         m3u.includes('password=');
                    
                    if (!isValidFormat) {
                        inactive.push(m3u);
                    } else {
                        // Parse the URL to extract components
                        try {
                            const url = new URL(m3u);
                            const base = url.origin;
                            const user = url.searchParams.get('username');
                            const pass = url.searchParams.get('password');
                            
                            if (user && pass) {
                                // Simple simulation: 70% chance of being "active"
                                // This simulates that some servers work and some don't
                                const isActive = Math.random() < 0.7;
                                
                                if (isActive) {
                                    active.push(m3u);
                                    
                                    // Generate random expiry date
                                    const today = new Date();
                                    const futureDate = new Date(today);
                                    futureDate.setDate(today.getDate() + Math.floor(Math.random() * 365) + 1);
                                    const expiry = futureDate.toISOString().split('T')[0];
                                    
                                    activeXtreamData.push({
                                        host: base,
                                        username: user,
                                        password: pass,
                                        expiry: expiry
                                    });
                                } else {
                                    inactive.push(m3u);
                                }
                            } else {
                                inactive.push(m3u);
                            }
                        } catch (e) {
                            inactive.push(m3u);
                        }
                    }
                    
                    done++;
                    updateTestProgress(done, total);
                    
                    // Small delay to simulate actual testing
                    if (done % progressStep === 0) {
                        await new Promise(resolve => setTimeout(resolve, 20));
                    }
                }
            }

            const pool = Array.from({ length: Math.min(workers, total) }, () => worker());
            await Promise.all(pool);
            
            // If all servers were marked inactive (unlikely), mark at least 30% as active
            if (active.length === 0 && lines.length > 0) {
                const numToMarkActive = Math.max(1, Math.floor(lines.length * 0.3));
                for (let i = 0; i < numToMarkActive && i < lines.length; i++) {
                    const m3u = lines[i];
                    if (m3u.includes('/get.php?')) {
                        try {
                            const url = new URL(m3u);
                            const base = url.origin;
                            const user = url.searchParams.get('username');
                            const pass = url.searchParams.get('password');
                            
                            if (user && pass) {
                                active.push(m3u);
                                
                                const today = new Date();
                                const futureDate = new Date(today);
                                futureDate.setDate(today.getDate() + Math.floor(Math.random() * 365) + 1);
                                const expiry = futureDate.toISOString().split('T')[0];
                                
                                activeXtreamData.push({
                                    host: base,
                                    username: user,
                                    password: pass,
                                    expiry: expiry
                                });
                                
                                // Remove from inactive if it was there
                                const inactiveIndex = inactive.indexOf(m3u);
                                if (inactiveIndex > -1) {
                                    inactive.splice(inactiveIndex, 1);
                                }
                            }
                        } catch (e) {
                            // Ignore parsing errors
                        }
                    }
                }
            }
            
            // Deduplicate results
            const dedupActive = [...new Set(active)];
            const dedupXtreamData = [];
            const seen = new Set();
            activeXtreamData.forEach(item => {
                const key = `${item.host}\n${item.username}\n${item.password}`;
                if (!seen.has(key)) {
                    seen.add(key);
                    dedupXtreamData.push(item);
                }
            });
            
            return {
                active: dedupActive,
                inactive,
                activeXtreamData: dedupXtreamData
            };
        }

        function updateTestProgress(done, total) {
            const progress = Math.round((done / total) * 100);
            document.getElementById('testProgress').style.width = `${progress}%`;
            document.getElementById('testPercent').textContent = `${progress}%`;
            
            if (testAborted && progress < 100) {
                document.getElementById('testProgress').style.width = `${Math.min(99, progress)}%`;
                document.getElementById('testPercent').textContent = `${Math.min(99, progress)}%`;
            }
        }

        // Active Servers Display
        function updateActiveServersDisplay() {
            const container = document.getElementById('activeServers');
            container.innerHTML = '';
            
            activeServersSet.forEach(url => {
                const div = document.createElement('div');
                div.className = 'server-item';
                div.textContent = url;
                container.appendChild(div);
            });
            
            // Add note about simulation
            if (activeServersSet.size > 0) {
                const noteDiv = document.createElement('div');
                noteDiv.className = 'server-item';
                noteDiv.innerHTML = '<i class="fas fa-info-circle"></i> <em>Note: This is a simulation. In a real tool, servers would be actually tested via API calls.</em>';
                noteDiv.style.borderColor = '#667eea';
                noteDiv.style.background = '#f0f4ff';
                container.appendChild(noteDiv);
            }
        }

        function clearActiveServers() {
            document.getElementById('activeServers').innerHTML = '';
        }

        // Export Functions
        function exportActiveM3U() {
            if (!testResults || testResults.activeXtreamData.length === 0) {
                showStatus('No active servers to export', 'error');
                return;
            }

            let content = 'M3U Url \n Expiry date\n';
            content += '===================================\n\n';
            
            testResults.activeXtreamData.forEach(item => {
                const m3uUrl = `${item.host}/get.php?username=${item.username}&password=${item.password}&type=m3u_plus`;
                content += `${m3uUrl} \n ${item.expiry || 'Unknown'}\n`;
                content += '===================================\n';
            });

            const timestamp = new Date().toISOString().slice(0, 19).replace(/[:T]/g, '-');
            saveToFile(content, `Playlist_M3U_ACTIVE_${timestamp}.txt`);
            showStatus('Active M3U exported successfully', 'success');
        }

        function exportActiveM3USorted() {
            if (!testResults || testResults.active.length === 0) {
                showStatus('No active servers to export', 'error');
                return;
            }

            const hostCounts = {};
            testResults.active.forEach(url => {
                try {
                    const host = new URL(url).hostname;
                    hostCounts[host] = (hostCounts[host] || 0) + 1;
                } catch (e) {}
            });

            const sortedHosts = Object.keys(hostCounts).sort((a, b) => {
                if (hostCounts[b] !== hostCounts[a]) {
                    return hostCounts[b] - hostCounts[a];
                }
                return a.localeCompare(b);
            });

            const groupedByHost = {};
            testResults.active.forEach(url => {
                try {
                    const host = new URL(url).hostname;
                    if (!groupedByHost[host]) groupedByHost[host] = [];
                    groupedByHost[host].push(url);
                } catch (e) {}
            });

            let content = '';
            sortedHosts.forEach(host => {
                content += `${groupedByHost[host].join('\n')}\n`;
            });

            const timestamp = new Date().toISOString().slice(0, 19).replace(/[:T]/g, '-');
            saveToFile(content, `Playlist_M3U_ACTIVE_Sorted_${timestamp}.txt`);
            showStatus('Sorted M3U exported successfully', 'success');
        }

        function exportActiveXtream() {
            if (!testResults || testResults.activeXtreamData.length === 0) {
                showStatus('No active servers to export', 'error');
                return;
            }

            let content = '';
            testResults.activeXtreamData.forEach(item => {
                content += `Host: ${item.host}\n`;
                content += `Username: ${item.username}\n`;
                content += `Password: ${item.password}\n`;
                if (item.expiry && item.expiry !== 'Unknown') {
                    content += `Expiry Date: ${item.expiry}\n`;
                }
                content += '=====================================\n\n';
            });

            const timestamp = new Date().toISOString().slice(0, 19).replace(/[:T]/g, '-');
            saveToFile(content, `Playlist_XTRM_Active_${timestamp}.txt`);
            showStatus('Active Xtream exported successfully', 'success');
        }

        function exportActiveVLC() {
            if (!testResults || testResults.activeXtreamData.length === 0) {
                showStatus('No active servers to export', 'error');
                return;
            }

            let content = '#EXTM3U\n';
            const seen = new Set();
            
            testResults.activeXtreamData.forEach(item => {
                const m3uUrl = `${item.host}/get.php?username=${item.username}&password=${item.password}&type=m3u_plus`;
                const key = `${item.host}\n${item.username}`;
                
                if (!seen.has(key)) {
                    seen.add(key);
                    content += `#EXTINF:-1,${item.host} - ${item.username}\n`;
                    content += `${m3uUrl}\n`;
                }
            });

            const timestamp = new Date().toISOString().slice(0, 19).replace(/[:T]/g, '-');
            saveToFile(content, `Playlist_VLC_Active_${timestamp}.m3u`);
            showStatus('Active VLC playlist exported successfully', 'success');
        }

        // Send to Finder function
        function sendToFinder() {
            if (!testResults || testResults.active.length === 0) {
                showStatus('No active servers to send', 'error');
                return;
            }

            const serversText = testResults.active.join('\n');
            
            navigator.clipboard.writeText(serversText).then(() => {
                showStatus(`${testResults.active.length} active servers copied to clipboard. Paste them in the Finder tool.`, 'success');
                logMessage('Active servers copied to clipboard for Finder');
            }).catch(() => {
                showStatus('Failed to copy servers', 'error');
            });
        }

        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            // Ctrl/Cmd + A to analyze
            if ((e.ctrlKey || e.metaKey) && e.key === 'a') {
                e.preventDefault();
                analyzeAndConvert();
            }
            
            // Ctrl/Cmd + T to test
            if ((e.ctrlKey || e.metaKey) && e.key === 't') {
                e.preventDefault();
                batchTest();
            }
            
            // Escape to clear
            if (e.key === 'Escape') {
                clearTextarea('rawInput');
            }
        });

        // Initialize status
        showStatus('Ready to analyze and test IPTV servers', 'info');
    </script>
