    <title>Simple Xtream Fetcher</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
        }

        h1 {
            text-align: center;
            color: #4a5568;
            margin-bottom: 10px;
            font-size: 2.5rem;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            text-align: center;
            color: #718096;
            margin-bottom: 30px;
            font-size: 1.1rem;
        }

        /* Input Section - UPDATED */
        .input-section {
            background: #f7fafc;
            padding: 25px;
            border-radius: 15px;
            margin-bottom: 30px;
            border: 2px solid #e2e8f0;
            transition: all 0.3s ease;
        }

        .input-section:focus-within {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .input-label {
            display: block;
            font-weight: 600;
            color: #4a5568;
            margin-bottom: 12px;
            font-size: 1.1rem;
        }

        /* UPDATED: Single line input with buttons */
        .input-with-buttons {
            display: flex;
            gap: 10px;
            align-items: center;
            margin-bottom: 15px;
        }

        .input-with-buttons input {
            flex: 1;
            padding: 12px 20px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 1rem;
            transition: all 0.3s ease;
            background: white;
            height: 46px;
        }

        .input-with-buttons input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .input-with-buttons input::placeholder {
            color: #a0aec0;
        }

        /* UPDATED: Smaller buttons in input row */
        .input-buttons {
            display: flex;
            gap: 8px;
            flex-shrink: 0;
        }

        .btn-input {
            padding: 10px 15px;
            border: none;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            height: 46px;
            min-width: 80px;
        }

        .btn-input:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .btn-input:active {
            transform: translateY(0);
        }

        .btn-input-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .btn-input-primary:hover {
            background: linear-gradient(135deg, #5a67d8, #6b46c1);
        }

        .btn-input-secondary {
            background: #edf2f7;
            color: #4a5568;
            border: 2px solid #e2e8f0;
        }

        .btn-input-secondary:hover {
            background: #e2e8f0;
            border-color: #cbd5e0;
        }

        .btn-input-danger {
            background: linear-gradient(135deg, #f56565, #c53030);
            color: white;
        }

        .btn-input-danger:hover {
            background: linear-gradient(135deg, #e53e3e, #b83232);
        }

        /* Categories Section */
        .categories-section {
            margin-bottom: 30px;
        }

        .section-title {
            font-size: 1.3rem;
            color: #4a5568;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #e2e8f0;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-title::before {
            content: '';
            width: 4px;
            height: 20px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 2px;
        }

        .categories-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }

        @media (max-width: 1024px) {
            .categories-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 768px) {
            .categories-grid {
                grid-template-columns: 1fr;
            }
        }

        .category-box {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            border: 2px solid #e2e8f0;
            transition: all 0.3s ease;
            height: 350px;
            display: flex;
            flex-direction: column;
        }

        .category-box:hover {
            transform: translateY(-5px);
            border-color: #667eea;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.15);
        }

        .category-header {
            padding: 20px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .category-type {
            font-size: 1.1rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .category-count {
            background: rgba(255, 255, 255, 0.2);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 600;
        }

        .category-search {
            padding: 15px;
            border-bottom: 2px solid #e2e8f0;
        }

        .category-search input {
            width: 100%;
            padding: 10px 15px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }

        .category-search input:focus {
            outline: none;
            border-color: #667eea;
        }

        .category-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
            max-height: 220px;
        }

        .category-item {
            padding: 12px 15px;
            margin: 5px 0;
            background: #f7fafc;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 1px solid #e2e8f0;
        }

        .category-item:hover {
            background: #edf2f7;
            border-color: #cbd5e0;
            transform: translateX(5px);
        }

        .category-item.active {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.1), rgba(118, 75, 162, 0.1));
            border-color: #667eea;
            color: #667eea;
            font-weight: 600;
        }

        .category-item-name {
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .category-item-count {
            background: #e2e8f0;
            padding: 3px 8px;
            border-radius: 12px;
            font-size: 0.85rem;
            font-weight: 600;
            min-width: 40px;
            text-align: center;
        }

        .category-item.active .category-item-count {
            background: #667eea;
            color: white;
        }

        /* Channels Section */
        .channels-section {
            background: white;
            border-radius: 15px;
            border: 2px solid #e2e8f0;
            overflow: hidden;
        }

        .channels-header {
            padding: 15px 20px;
            background: linear-gradient(135deg, #48bb78, #38a169);
            color: white;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .channels-header .section-title {
            color: white;
            border-bottom: none;
            margin: 0;
            font-size: 1.2rem;
        }

        .channels-header .section-title::before {
            background: white;
        }

        .channel-count {
            background: rgba(255, 255, 255, 0.2);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 600;
        }

        /* Channels controls */
        .channels-controls {
            padding: 12px 15px;
            border-bottom: 2px solid #e2e8f0;
            display: flex;
            align-items: center;
            gap: 10px;
            background: #f7fafc;
        }

        .channels-controls input {
            flex: 1;
            padding: 8px 15px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 0.95rem;

        .channels-controls input:focus {

            border-color: #48bb78;

        }

        /* UPDATED: Inline buttons */
        .inline-buttons {
            display: flex;
            gap: 8px;
            margin-left: 10px;
        }

        .btn-small {

            border: none;
            border-radius: 6px;

            min-width: 36px;
            height: 36px;
            justify-content: center;

            color: white;
        }

        .btn-play:hover {
            background: #38a169;
        }

        .btn-copy {
            background: #4299e1;
            color: white;
        }

        .btn-copy:hover {
            background: #3182ce;
        }

        .btn-open {
            background: #ed8936;
            color: white;
        }

        .btn-open:hover {
            background: #dd6b20;
        }

        /* UPDATED: Save VLC button */
        .btn-save-vlc {
            background: linear-gradient(135deg, #9f7aea, #805ad5);
            color: white;
        }

        .btn-save-vlc:hover {
            background: linear-gradient(135deg, #8b5cf6, #7c3aed);
        }

        /* Channels Grid Layout - 2 columns */
        .channels-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            padding: 12px;
            max-height: 500px;
            overflow-y: auto;
        }

        @media (max-width: 768px) {
            .channels-grid {
                grid-template-columns: 1fr;
            }
        }

        /* Compact Channel Item */
        .channel-item {
            padding: 8px 10px;
            background: #f7fafc;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: all 0.3s ease;
            min-height: 44px;
            height: 44px;
        }

        .channel-item:hover {
            background: #edf2f7;
            border-color: #cbd5e0;
            transform: translateY(-1px);
        }

        .channel-info {
            display: flex;
            align-items: center;
            gap: 10px;
            flex: 1;
            min-width: 0;
        }

        .channel-number {
            width: 28px;
            height: 28px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 0.85rem;
            flex-shrink: 0;
        }

        .channel-name {
            flex: 1;
            font-weight: 500;
            color: #4a5568;
            font-size: 0.9rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .channel-extension {
            background: #e2e8f0;
            padding: 2px 8px;
            border-radius: 10px;
            font-family: 'Courier New', monospace;
            font-size: 0.8rem;
            font-weight: 600;
            color: #4a5568;
            flex-shrink: 0;
        }

        .channel-actions {
            display: flex;
            gap: 6px;
            flex-shrink: 0;
        }

        /* Status Message */
        .status-message {
            padding: 15px;
            margin: 20px 0;
            border-radius: 10px;
            display: none;
            align-items: center;
            gap: 12px;
            font-weight: 500;
        }

        .status-success {
            background: rgba(72, 187, 120, 0.1);
            border: 2px solid #48bb78;
            color: #276749;
        }

        .status-error {
            background: rgba(245, 101, 101, 0.1);
            border: 2px solid #f56565;
            color: #c53030;
        }

        .status-loading {
            background: rgba(102, 126, 234, 0.1);
            border: 2px solid #667eea;
            color: #4a5568;
        }

        /* Scrollbar Styling */
        .category-list::-webkit-scrollbar,
        .channels-grid::-webkit-scrollbar {
            width: 6px;
        }

        .category-list::-webkit-scrollbar-track,
        .channels-grid::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 3px;
        }

        .category-list::-webkit-scrollbar-thumb,
        .channels-grid::-webkit-scrollbar-thumb {
            background: #cbd5e0;
            border-radius: 3px;
        }

        .category-list::-webkit-scrollbar-thumb:hover,
        .channels-grid::-webkit-scrollbar-thumb:hover {
            background: #a0aec0;
        }

        /* Loading Animation */
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #a0aec0;
            grid-column: 1 / -1;

        .empty-state i {

            opacity: 0.5;
        }

        .empty-state p {
            font-size: 1.1rem;
        }

        /* Server Info */

        }

        .server-details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 10px;
            font-size: 0.9rem;
        }

        .server-detail {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .server-detail span:first-child {
            font-weight: 600;
            color: #4a5568;
            min-width: 100px;
        }

        .server-detail span:last-child {
            color: #718096;

<body>
    <div class="container">
        <h1>📡 Simple Xtream Fetcher</h1>
        <p class="subtitle">Extract and browse categories & channels from Xtream servers</p>

        <!-- Input Section - UPDATED -->
        <div class="input-section">
            <label class="input-label">Xtream Server M3U Link</label>
            <div class="input-with-buttons">
                <input type="text" id="serverUrl" placeholder="https://server.com/get.php?username=user&password=pass&type=m3u_plus">
                <div class="input-buttons">
                    <button class="btn-input btn-input-secondary" onclick="pasteFromClipboard()" title="Paste from clipboard">
                        <i class="fas fa-paste"></i> Paste
                    </button>
                    <button class="btn-input btn-input-primary" onclick="fetchServerData()" title="Fetch server data">
                        <i class="fas fa-search"></i> Fetch
                    </button>
                    <button class="btn-input btn-input-danger" onclick="clearAll()" title="Clear all data">
                        <i class="fas fa-trash"></i> Clear
                    </button>
                </div>
            </div>
        </div>

        <!-- Status Message -->
        <div id="statusMessage" class="status-message">
            <i class="fas fa-info-circle"></i>
            <span id="statusText">Ready to fetch server data</span>
        </div>

        <!-- Server Info -->
        <div id="serverInfo" class="server-info" style="display: none;">
            <h3><i class="fas fa-server"></i> Server Information</h3>
            <div class="server-details">
                <div class="server-detail">
                    <span>Host:</span>
                    <span id="serverHost">-</span>
                </div>
                <div class="server-detail">
                    <span>User:</span>
                    <span id="serverUser">-</span>
                </div>
                <div class="server-detail">
                    <span>Status:</span>
                    <span id="serverStatus">-</span>
                </div>
                <div class="server-detail">
                    <span>Expiry:</span>
                    <span id="serverExpiry">-</span>
                </div>
            </div>
        </div>

        <!-- Categories Section -->
        <div id="categoriesSection" class="categories-section" style="display: none;">
            <div class="section-title">
                <i class="fas fa-folder"></i> Categories
            </div>
            <div class="categories-grid">
                <!-- Live Categories -->
                <div class="category-box">
                    <div class="category-header">
                        <div class="category-type">
                            <i class="fas fa-tv"></i> Live
                        </div>
                        <div class="category-count" id="liveCount">0</div>
                    </div>
                    <div class="category-search">
                        <input type="text" placeholder="Search live categories..." oninput="filterCategories('live', this.value)">
                    </div>
                    <div class="category-list" id="liveList">
                        <!-- Live categories will be added here -->
                    </div>
                </div>

                <!-- VOD Categories -->
                <div class="category-box">
                    <div class="category-header" style="background: linear-gradient(135deg, #4299e1, #3182ce);">
                        <div class="category-type">
                            <i class="fas fa-film"></i> VOD
                        </div>
                        <div class="category-count" id="vodCount">0</div>
                    </div>
                    <div class="category-search">
                        <input type="text" placeholder="Search VOD categories..." oninput="filterCategories('vod', this.value)">
                    </div>
                    <div class="category-list" id="vodList">
                        <!-- VOD categories will be added here -->
                    </div>
                </div>

                <!-- Series Categories -->
                <div class="category-box">
                    <div class="category-header" style="background: linear-gradient(135deg, #ed8936, #dd6b20);">
                        <div class="category-type">
                            <i class="fas fa-video"></i> Series
                        </div>
                        <div class="category-count" id="seriesCount">0</div>
                    </div>
                    <div class="category-search">
                        <input type="text" placeholder="Search series categories..." oninput="filterCategories('series', this.value)">
                    </div>
                    <div class="category-list" id="seriesList">
                        <!-- Series categories will be added here -->
                    </div>
                </div>
            </div>
        </div>

        <!-- Channels Section - UPDATED -->
        <div id="channelsSection" class="channels-section" style="display: none;">
            <div class="channels-header">
                <div class="section-title">
                    <i class="fas fa-list"></i> Channels
                </div>
                <div class="channel-count" id="totalChannels">0</div>
            </div>
            <div class="channels-controls">
                <input type="text" id="channelSearch" placeholder="Search channels..." oninput="filterChannels(this.value)">
                <div class="inline-buttons">
                    <button class="btn-small btn-save-vlc" onclick="saveAsVLC()" title="Save as VLC playlist">
                        <i class="fas fa-save"></i> Save VLC
                    </button>
                    <button class="btn-small btn-copy" onclick="copyAllChannelUrls()" title="Copy all channel URLs">
                        <i class="fas fa-copy"></i> Copy All
                    </button>
                </div>
            </div>
            <div class="channels-grid" id="channelsGrid">
                <!-- Channels will be added here in 2-column grid -->
            </div>
        </div>
    </div>

    <script>
        let serverData = {
            base: '',
            user: '',
            pass: '',
            categories: {
                live: [],
                vod: [],
                series: []
            },
            channels: {
                live: [],
                vod: [],
                series: []
            },
            currentCategory: null,
            currentChannels: []
        };

        async function pasteFromClipboard() {
            try {
                const text = await navigator.clipboard.readText();
                document.getElementById('serverUrl').value = text;
                showStatus('URL pasted from clipboard', 'success');
            } catch (err) {
                showStatus('Failed to paste from clipboard', 'error');
            }
        }

        function showStatus(message, type = 'info') {
            const statusEl = document.getElementById('statusMessage');
            const textEl = document.getElementById('statusText');
            
            statusEl.className = `status-message status-${type}`;
            textEl.textContent = message;
            statusEl.style.display = 'flex';
            
            // Auto-hide success messages after 3 seconds
            if (type === 'success') {
                setTimeout(() => {
                    statusEl.style.display = 'none';
                }, 3000);
            }
        }

        function extractXtreamCredentials(url) {
            try {
                const urlObj = new URL(url);
                const base = urlObj.origin;
                const user = urlObj.searchParams.get('username');
                const pass = urlObj.searchParams.get('password');
                
                if (!user || !pass) {
                    throw new Error('Invalid Xtream URL');
                }
                
                return { base, user, pass };
            } catch (err) {
                throw new Error('Invalid URL format');
            }
        }

        async function fetchServerData() {
            const urlInput = document.getElementById('serverUrl').value.trim();
            
            if (!urlInput) {
                showStatus('Please enter a server URL', 'error');
                return;
            }

            // Show loading state
            const fetchBtn = document.querySelector('.btn-input-primary');
            const originalText = fetchBtn.innerHTML;
            fetchBtn.innerHTML = '<div class="loading"></div>';
            fetchBtn.disabled = true;
            
            showStatus('Fetching server data...', 'loading');

            try {
                // Extract credentials
                const credentials = extractXtreamCredentials(urlInput);
                serverData.base = credentials.base;
                serverData.user = credentials.user;
                serverData.pass = credentials.pass;

                // Fetch server info
                const apiBase = `${serverData.base}/player_api.php?username=${serverData.user}&password=${serverData.pass}`;
                const [info, liveChannels, vodChannels, seriesChannels, liveCats, vodCats, seriesCats] = await Promise.all([
                    fetch(apiBase).then(r => r.json()),
                    fetch(`${apiBase}&action=get_live_streams`).then(r => r.json()),
                    fetch(`${apiBase}&action=get_vod_streams`).then(r => r.json()),
                    fetch(`${apiBase}&action=get_series`).then(r => r.json()),
                    fetch(`${apiBase}&action=get_live_categories`).then(r => r.json()),
                    fetch(`${apiBase}&action=get_vod_categories`).then(r => r.json()),
                    fetch(`${apiBase}&action=get_series_categories`).then(r => r.json())
                ]);

                // Store data
                serverData.categories.live = Array.isArray(liveCats) ? liveCats : [];
                serverData.categories.vod = Array.isArray(vodCats) ? vodCats : [];
                serverData.categories.series = Array.isArray(seriesCats) ? seriesCats : [];
                
                serverData.channels.live = Array.isArray(liveChannels) ? liveChannels : [];
                serverData.channels.vod = Array.isArray(vodChannels) ? vodChannels : [];
                serverData.channels.series = Array.isArray(seriesChannels) ? seriesChannels : [];

                // Update UI
                updateServerInfo(info);
                renderCategories();
                showStatus('Server data fetched successfully!', 'success');

                // Show sections
                document.getElementById('serverInfo').style.display = 'block';
                document.getElementById('categoriesSection').style.display = 'block';
                
            } catch (error) {
                console.error('Fetch error:', error);
                showStatus(`Error: ${error.message}`, 'error');
            } finally {
                // Restore button state
                fetchBtn.innerHTML = '<i class="fas fa-search"></i> Fetch';
                fetchBtn.disabled = false;
            }
        }

        function updateServerInfo(info) {
            document.getElementById('serverHost').textContent = new URL(serverData.base).hostname;
            document.getElementById('serverUser').textContent = serverData.user;
            
            const status = info.user_info?.status || 'Unknown';
            document.getElementById('serverStatus').textContent = status;
            
            let expiry = 'Unknown';
            if (info.user_info?.exp_date) {
                const expDate = new Date(info.user_info.exp_date * 1000);
                expiry = expDate.toLocaleDateString();
            }
            document.getElementById('serverExpiry').textContent = expiry;
        }

        function renderCategories() {
            // Update counts
            document.getElementById('liveCount').textContent = serverData.categories.live.length;
            document.getElementById('vodCount').textContent = serverData.categories.vod.length;
            document.getElementById('seriesCount').textContent = serverData.categories.series.length;

            // Render live categories
            renderCategoryList('live', serverData.categories.live);
            renderCategoryList('vod', serverData.categories.vod);
            renderCategoryList('series', serverData.categories.series);
        }

        function renderCategoryList(type, categories) {
            const listEl = document.getElementById(`${type}List`);
            listEl.innerHTML = '';

            if (!categories || categories.length === 0) {
                listEl.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-folder-open"></i>
                        <p>No ${type} categories found</p>
                    </div>
                `;
                return;
            }

            categories.forEach((cat, index) => {
                // Count channels in this category
                const channelCount = serverData.channels[type].filter(
                    ch => ch.category_id == cat.category_id
                ).length;

                const item = document.createElement('div');
                item.className = 'category-item';
                item.dataset.type = type;
                item.dataset.categoryId = cat.category_id;
                item.innerHTML = `
                    <div class="category-item-name">${cat.category_name || 'Unnamed'}</div>
                    <div class="category-item-count">${channelCount}</div>
                `;

                item.addEventListener('click', () => selectCategory(type, cat.category_id, cat.category_name));
                listEl.appendChild(item);
            });
        }

        function filterCategories(type, query) {
            const items = document.querySelectorAll(`#${type}List .category-item`);
            const searchTerm = query.toLowerCase().trim();

            items.forEach(item => {
                const name = item.querySelector('.category-item-name').textContent.toLowerCase();
                item.style.display = name.includes(searchTerm) ? 'flex' : 'none';
            });
        }

        function selectCategory(type, categoryId, categoryName) {
            // Remove active class from all categories
            document.querySelectorAll('.category-item').forEach(item => {
                item.classList.remove('active');
            });

            // Add active class to selected category
            const selectedItem = document.querySelector(`[data-type="${type}"][data-category-id="${categoryId}"]`);
            if (selectedItem) {
                selectedItem.classList.add('active');
            }

            // Store current category and channels
            serverData.currentCategory = { type, categoryId, categoryName };
            serverData.currentChannels = serverData.channels[type].filter(
                ch => ch.category_id == categoryId
            );

            renderChannels(serverData.currentChannels, categoryName);

            // Show channels section
            document.getElementById('channelsSection').style.display = 'block';

            // Scroll to channels section
            document.getElementById('channelsSection').scrollIntoView({ 
                behavior: 'smooth',
                block: 'start'
            });
        }

        function renderChannels(channels, categoryName) {
            const gridEl = document.getElementById('channelsGrid');
            const countEl = document.getElementById('totalChannels');

            countEl.textContent = channels.length;

            if (channels.length === 0) {
                gridEl.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-video-slash"></i>
                        <p>No channels found in "${categoryName}"</p>
                    </div>
                `;
                return;
            }

            gridEl.innerHTML = '';

            channels.forEach((channel, index) => {
                const name = channel.name || channel.title || 'Unnamed';
                const extension = channel.container_extension || (channel.series_id ? 'mkv' : 
                                channel.movie_data ? 'mp4' : 'ts');
                
                const streamId = channel.stream_id || channel.series_id || channel.id;
                const pathType = channel.series_id ? 'series' : 
                               channel.movie_data ? 'movie' : 'live';
                
                const streamUrl = `${serverData.base}/${pathType}/${serverData.user}/${serverData.pass}/${streamId}.${extension}`;

                const item = document.createElement('div');
                item.className = 'channel-item';
                item.dataset.index = index;
                item.innerHTML = `
                    <div class="channel-info">
                        <div class="channel-number">${index + 1}</div>
                        <div class="channel-name" title="${name}">${name}</div>
                        <div class="channel-extension">.${extension}</div>
                    </div>
                    <div class="channel-actions">
                        <button class="btn-small btn-play" onclick="playStream('${streamUrl}', '${name}')" title="Play">
                            <i class="fas fa-play"></i>
                        </button>
                        <button class="btn-small btn-copy" onclick="copyToClipboard('${streamUrl}')" title="Copy URL">
                            <i class="fas fa-copy"></i>
                        </button>
                        <button class="btn-small btn-open" onclick="openInNewTab('${streamUrl}')" title="Open in new tab">
                            <i class="fas fa-external-link-alt"></i>
                        </button>
                    </div>
                `;

                gridEl.appendChild(item);
            });
        }

        function filterChannels(query) {
            const items = document.querySelectorAll('.channel-item');
            const searchTerm = query.toLowerCase().trim();

            if (!searchTerm) {
                items.forEach(item => {
                    item.style.display = 'flex';
                });
                return;
            }

            items.forEach(item => {
                const name = item.querySelector('.channel-name').textContent.toLowerCase();
                item.style.display = name.includes(searchTerm) ? 'flex' : 'none';
            });
        }

        function playStream(url, name) {
            // In a real application, you would integrate with a video player
            // For this demo, we'll just open in a new tab
            openInNewTab(url);
        }

        async function copyToClipboard(text) {
            try {
                await navigator.clipboard.writeText(text);
                showStatus('URL copied to clipboard', 'success');
            } catch (err) {
                showStatus('Failed to copy URL', 'error');
            }
        }

        async function copyAllChannelUrls() {
            if (serverData.currentChannels.length === 0) {
                showStatus('No channels to copy', 'error');
                return;
            }

            const urls = serverData.currentChannels.map((channel, index) => {
                const name = channel.name || channel.title || `Channel ${index + 1}`;
                const extension = channel.container_extension || (channel.series_id ? 'mkv' : 
                                channel.movie_data ? 'mp4' : 'ts');
                const streamId = channel.stream_id || channel.series_id || channel.id;
                const pathType = channel.series_id ? 'series' : 
                               channel.movie_data ? 'movie' : 'live';
                return `${serverData.base}/${pathType}/${serverData.user}/${serverData.pass}/${streamId}.${extension}`;
            }).join('\n');

            try {
                await navigator.clipboard.writeText(urls);
                showStatus(`Copied ${serverData.currentChannels.length} URLs to clipboard`, 'success');
            } catch (err) {
                showStatus('Failed to copy URLs', 'error');
            }
        }

        function saveAsVLC() {
            if (!serverData.currentCategory || serverData.currentChannels.length === 0) {
                showStatus('No channels to save as VLC playlist', 'error');
                return;
            }

            // Create VLC M3U format
            let m3uContent = '#EXTM3U\n';
            
            serverData.currentChannels.forEach((channel, index) => {
                const name = channel.name || channel.title || `Channel ${index + 1}`;
                const extension = channel.container_extension || (channel.series_id ? 'mkv' : 
                                channel.movie_data ? 'mp4' : 'ts');
                const streamId = channel.stream_id || channel.series_id || channel.id;
                const pathType = channel.series_id ? 'series' : 
                               channel.movie_data ? 'movie' : 'live';
                const streamUrl = `${serverData.base}/${pathType}/${serverData.user}/${serverData.pass}/${streamId}.${extension}`;
                
                // VLC M3U format: #EXTINF:-1,Channel Name
                m3uContent += `#EXTINF:-1,${name}\n`;
                m3uContent += `${streamUrl}\n`;
            });

            // Create filename in format: VLC_Category name_category type_item count.m3u
            const categoryName = serverData.currentCategory.categoryName.replace(/[^a-zA-Z0-9]/g, '_');
            const categoryType = serverData.currentCategory.type;
            const itemCount = serverData.currentChannels.length;
            const filename = `VLC_${categoryName}_${categoryType}_${itemCount}.m3u`;

            // Create download
            const blob = new Blob([m3uContent], { type: 'audio/x-mpegurl' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);

            showStatus(`VLC playlist saved as ${filename}`, 'success');
        }

        function openInNewTab(url) {
            window.open(url, '_blank');
        }

        function clearAll() {
            // Clear input
            document.getElementById('serverUrl').value = '';
            
            // Hide sections
            document.getElementById('serverInfo').style.display = 'none';
            document.getElementById('categoriesSection').style.display = 'none';
            document.getElementById('channelsSection').style.display = 'none';
            
            // Clear data
            serverData = {
                base: '',
                user: '',
                pass: '',
                categories: {
                    live: [],
                    vod: [],
                    series: []
                },
                channels: {
                    live: [],
                    vod: [],
                    series: []
                },
                currentCategory: null,
                currentChannels: []
            };
            
            // Clear lists
            document.getElementById('liveList').innerHTML = '';
            document.getElementById('vodList').innerHTML = '';
            document.getElementById('seriesList').innerHTML = '';
            document.getElementById('channelsGrid').innerHTML = '';
            
            // Reset counts
            document.getElementById('liveCount').textContent = '0';
            document.getElementById('vodCount').textContent = '0';
            document.getElementById('seriesCount').textContent = '0';
            document.getElementById('totalChannels').textContent = '0';
            
            // Remove active classes
            document.querySelectorAll('.category-item').forEach(item => {
                item.classList.remove('active');
            });
            
            showStatus('All data cleared', 'success');
        }

        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            // Ctrl/Cmd + V to paste
            if ((e.ctrlKey || e.metaKey) && e.key === 'v') {
                const focused = document.activeElement;
                if (!focused || focused.tagName !== 'INPUT') {
                    e.preventDefault();
                    pasteFromClipboard();
                }
            }
            
            // Enter to fetch
            if (e.key === 'Enter' && document.activeElement.id === 'serverUrl') {
                e.preventDefault();
                fetchServerData();
            }
            
            // Escape to clear search
            if (e.key === 'Escape') {
                const searchInputs = document.querySelectorAll('input[type="text"]');
                searchInputs.forEach(input => {
                    if (input.value) {
                        input.value = '';
                        const type = input.parentElement.previousElementSibling?.querySelector('.category-type')?.textContent?.toLowerCase().trim();
                        if (type && ['live', 'vod', 'series'].includes(type)) {
                            filterCategories(type, '');
                        } else if (input.id === 'channelSearch') {
                            filterChannels('');
                        }
                    }
                });
            }
        });

        // Example URL for quick testing
        document.getElementById('serverUrl').addEventListener('focus', function() {
            if (!this.value) {
                this.placeholder = 'Example: http://server.com/get.php?username=user&password=pass&type=m3u_plus';
            }
        });

        // Initialize with status message
        showStatus('Enter an Xtream server M3U URL and click "Fetch Server Data"', 'info');
    </script>
