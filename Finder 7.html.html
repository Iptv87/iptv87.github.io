<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple IPTV Finder</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
        }

        h1 {
            text-align: center;
            color: #4a5568;
            margin-bottom: 10px;
            font-size: 2.5rem;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            text-align: center;
            color: #718096;
            margin-bottom: 30px;
            font-size: 1.1rem;
        }

        /* Input Section */
        .input-section {
            background: #f7fafc;
            padding: 25px;
            border-radius: 15px;
            margin-bottom: 30px;
            border: 2px solid #e2e8f0;
            transition: all 0.3s ease;
        }

        .input-section:focus-within {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .section-label {
            display: block;
            font-weight: 600;
            color: #4a5568;
            margin-bottom: 12px;
            font-size: 1.1rem;
        }

        /* MODIFIED: Inline input row with increased width */
        .input-row-inline {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            align-items: stretch;
        }

        .input-group {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .servers-input {
            flex: 3; /* 3 times wider than keywords */
        }

        .keywords-input {
            flex: 1;
        }

        .input-group textarea,
        .input-group input {
            width: 100%;
            padding: 12px 20px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 1rem;
            transition: all 0.3s ease;
            background: white;
            font-family: inherit;
            min-height: 120px; /* Same height for both */
        }

        .input-group textarea {
            resize: vertical;
            min-height: 120px;
        }

        .input-group textarea:focus,
        .input-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        /* Search Options Grid */
        .options-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .option-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .option-label {
            font-weight: 600;
            color: #4a5568;
            font-size: 0.95rem;
        }

        .option-group select {
            width: 100%;
            padding: 10px 15px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 0.95rem;
            background: white;
        }

        /* Buttons */
        .buttons-row {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            min-height: 46px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .btn-primary:hover {
            background: linear-gradient(135deg, #5a67d8, #6b46c1);
        }

        .btn-secondary {
            background: #edf2f7;
            color: #4a5568;
            border: 2px solid #e2e8f0;
        }

        .btn-secondary:hover {
            background: #e2e8f0;
            border-color: #cbd5e0;
        }

        .btn-success {
            background: linear-gradient(135deg, #48bb78, #38a169);
            color: white;
        }

        .btn-success:hover {
            background: linear-gradient(135deg, #38a169, #2f855a);
        }

        .btn-warning {
            background: linear-gradient(135deg, #ed8936, #dd6b20);
            color: white;
        }

        .btn-warning:hover {
            background: linear-gradient(135deg, #dd6b20, #c05621);
        }

        .btn-vlc {
            background: linear-gradient(135deg, #9f7aea, #805ad5);
            color: white;
        }

        .btn-vlc:hover {
            background: linear-gradient(135deg, #8b5cf6, #7c3aed);
        }

        .btn-danger {
            background: linear-gradient(135deg, #f56565, #c53030);
            color: white;
        }

        .btn-danger:hover {
            background: linear-gradient(135deg, #e53e3e, #b83232);
        }

        /* Progress Bar */
        .progress-container {
            margin: 20px 0;
            display: none;
        }

        .progress-bar {
            width: 100%;
            height: 10px;
            background: #e2e8f0;
            border-radius: 5px;
            overflow: hidden;
            margin-bottom: 8px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 5px;
            width: 0%;
            transition: width 0.3s ease;
        }

        .progress-text {
            display: flex;
            justify-content: space-between;
            font-size: 0.9rem;
            color: #718096;
        }

        /* Status Message */
        .status-message {
            padding: 15px;
            margin: 20px 0;
            border-radius: 10px;
            display: none;
            align-items: center;
            gap: 12px;
            font-weight: 500;
        }

        .status-success {
            background: rgba(72, 187, 120, 0.1);
            border: 2px solid #48bb78;
            color: #276749;
        }

        .status-error {
            background: rgba(245, 101, 101, 0.1);
            border: 2px solid #f56565;
            color: #c53030;
        }

        .status-loading {
            background: rgba(102, 126, 234, 0.1);
            border: 2px solid #667eea;
            color: #4a5568;
        }

        /* Results Count */
        .results-count {
            display: none;
            margin: 20px 0;
            padding: 15px;
            background: #f7fafc;
            border-radius: 10px;
            border: 2px solid #e2e8f0;
        }

        .count-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            text-align: center;
        }

        .count-box {
            padding: 15px;
            border-radius: 8px;
        }

        .count-live {
            background: rgba(102, 126, 234, 0.1);
            border: 2px solid #667eea;
        }

        .count-vod {
            background: rgba(72, 187, 120, 0.1);
            border: 2px solid #48bb78;
        }

        .count-series {
            background: rgba(237, 137, 54, 0.1);
            border: 2px solid #ed8936;
        }

        .count-number {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .count-label {
            font-size: 0.9rem;
            color: #718096;
            font-weight: 600;
        }

        /* Results Section */
        .results-section {
            display: none;
            margin-top: 30px;
        }

        .results-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .export-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .table-container {
            overflow-x: auto;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            background: white;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 1000px;
        }

        th {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 15px;
            text-align: left;
            font-weight: 600;
            position: sticky;
            top: 0;
            cursor: pointer;
            user-select: none;
            transition: background 0.3s ease;
        }

        th:hover {
            background: linear-gradient(135deg, #5a67d8, #6b46c1);
        }

        th.sortable {
            position: relative;
            padding-right: 30px;
        }

        th.sortable::after {
            content: '↕';
            position: absolute;
            right: 10px;
            opacity: 0.7;
        }

        th.sort-asc::after {
            content: '↑';
            opacity: 1;
        }

        th.sort-desc::after {
            content: '↓';
            opacity: 1;
        }

        th:first-child {
            border-top-left-radius: 8px;
        }

        th:last-child {
            border-top-right-radius: 8px;
        }

        td {
            padding: 12px 15px;
            border-bottom: 1px solid #e2e8f0;
            vertical-align: top;
        }

        tr:hover {
            background: #f7fafc;
        }

        tr:last-child td {
            border-bottom: none;
        }

        .server-cell {
            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
            color: #4a5568;
        }

        .category-cell {
            font-weight: 600;
            color: #4a5568;
        }

        .type-cell {
            font-size: 0.85rem;
            font-weight: 600;
            padding: 4px 10px;
            border-radius: 20px;
            display: inline-block;
        }

        .type-live {
            background: rgba(102, 126, 234, 0.1);
            color: #667eea;
        }

        .type-vod {
            background: rgba(72, 187, 120, 0.1);
            color: #38a169;
        }

        .type-series {
            background: rgba(237, 137, 54, 0.1);
            color: #dd6b20;
        }

        .count-cell {
            text-align: center;
            font-weight: 700;
            color: #4a5568;
        }

        .expiry-cell {
            font-family: 'Courier New', monospace;
            color: #718096;
        }

        .actions-cell {
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
        }

        .btn-small {
            padding: 6px 12px;
            border: none;
            border-radius: 6px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 5px;
            white-space: nowrap;
        }

        .btn-small:hover {
            transform: translateY(-1px);
        }

        /* Checkbox for selection */
        .selection-cell {
            text-align: center;
            width: 50px;
        }

        .select-all-checkbox {
            cursor: pointer;
            width: 20px;
            height: 20px;
            vertical-align: middle;
        }

        .item-checkbox {
            cursor: pointer;
            width: 18px;
            height: 18px;
            vertical-align: middle;
        }

        /* Channels List */
        .channels-container {
            max-height: 300px;
            overflow-y: auto;
            margin-top: 10px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 10px;
            background: #f7fafc;
        }

        .channel-item {
            padding: 8px;
            margin: 4px 0;
            background: white;
            border-radius: 6px;
            border: 1px solid #e2e8f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .channel-info {
            display: flex;
            align-items: center;
            gap: 10px;
            flex: 1;
        }

        .channel-number {
            width: 24px;
            height: 24px;
            background: #e2e8f0;
            color: #4a5568;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .channel-name {
            flex: 1;
            font-size: 0.9rem;
            color: #4a5568;
        }

        .channel-actions {
            display: flex;
            gap: 4px;
        }

        /* Loading Animation */
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #a0aec0;
            grid-column: 1 / -1;
        }

        .empty-state i {
            font-size: 3rem;
            margin-bottom: 15px;
            opacity: 0.5;
        }

        .empty-state p {
            font-size: 1.1rem;
        }

        /* Scrollbar Styling */
        .channels-container::-webkit-scrollbar {
            width: 6px;
        }

        .channels-container::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 3px;
        }

        .channels-container::-webkit-scrollbar-thumb {
            background: #cbd5e0;
            border-radius: 3px;
        }

        .channels-container::-webkit-scrollbar-thumb:hover {
            background: #a0aec0;
        }

        /* Responsive */
        @media (max-width: 1024px) {
            .input-row-inline {
                flex-direction: column;
            }
            
            .servers-input,
            .keywords-input {
                flex: 1;
            }
        }

        @media (max-width: 768px) {
            .options-grid {
                grid-template-columns: 1fr;
            }
            
            .count-grid {
                grid-template-columns: 1fr;
            }
            
            .buttons-row {
                flex-direction: column;
            }
            
            .btn {
                width: 100%;
            }
            
            .export-buttons {
                flex-direction: column;
            }
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <h1>🔍 Simple IPTV Finder</h1>
        <p class="subtitle">Search for channels and categories across multiple IPTV servers</p>

        <!-- Input Section -->
        <div class="input-section">
            <div class="input-row-inline">
                <div class="input-group servers-input">
                    <label class="section-label">Servers List (one per line)</label>
                    <textarea id="serversInput" placeholder="Example formats:
http://server.com/get.php?username=user&password=pass&type=m3u_plus
server.com user pass
server.com,user,pass"></textarea>
                </div>
                <div class="input-group keywords-input">
                    <label class="section-label">Keywords to Search</label>
                    <input type="text" id="keywordsInput" placeholder="bein, sports, arabic, news">
                </div>
            </div>

            <!-- Search Options -->
            <div class="options-grid">
                <div class="option-group">
                    <label class="option-label">Search Mode</label>
                    <select id="searchMode">
                        <option value="categories">Search in Categories</option>
                        <option value="channels">Search in Channels</option>
                    </select>
                </div>
                
                <div class="option-group">
                    <label class="option-label">Content Type</label>
                    <select id="contentType">
                        <option value="live">Live Only</option>
                        <option value="vod">VOD Only</option>
                        <option value="live_vod">Live + VOD</option>
                        <option value="all">Live + VOD + Series</option>
                    </select>
                </div>
                
                <div class="option-group">
                    <label class="option-label">Keyword Logic</label>
                    <select id="keywordLogic">
                        <option value="any">ANY Keyword (OR)</option>
                        <option value="all">ALL Keywords (AND)</option>
                    </select>
                </div>
                
                <div class="option-group">
                    <label class="option-label">Match Type</label>
                    <select id="matchType">
                        <option value="contains">Contains (Fuzzy)</option>
                        <option value="regex">Regex</option>
                    </select>
                </div>
            </div>

            <!-- Action Buttons -->
            <div class="buttons-row">
                <button class="btn btn-primary" onclick="startSearch()">
                    <i class="fas fa-search"></i> Start Search
                </button>
                <button class="btn btn-secondary" onclick="pasteServers()">
                    <i class="fas fa-paste"></i> Paste Servers
                </button>
                <button class="btn btn-secondary" onclick="clearAll()">
                    <i class="fas fa-trash"></i> Clear All
                </button>
            </div>
        </div>

        <!-- Status Message -->
        <div id="statusMessage" class="status-message">
            <i class="fas fa-info-circle"></i>
            <span id="statusText">Ready to search. Enter servers and keywords.</span>
        </div>

        <!-- Progress Bar -->
        <div class="progress-container" id="progressContainer">
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="progress-text">
                <span id="progressCurrent">0</span> / <span id="progressTotal">0</span>
                <span id="progressPercent">0%</span>
            </div>
        </div>

        <!-- Results Count -->
        <div class="results-count" id="resultsCount">
            <div class="count-grid">
                <div class="count-box count-live">
                    <div class="count-number" id="liveCount">0</div>
                    <div class="count-label">Live Channels</div>
                </div>
                <div class="count-box count-vod">
                    <div class="count-number" id="vodCount">0</div>
                    <div class="count-label">VOD Items</div>
                </div>
                <div class="count-box count-series">
                    <div class="count-number" id="seriesCount">0</div>
                    <div class="count-label">Series Items</div>
                </div>
            </div>
        </div>

        <!-- Results Section -->
        <div class="results-section" id="resultsSection">
            <div class="results-header">
                <h2 class="section-label">Search Results</h2>
                <div class="export-buttons" id="exportButtons" style="display: none;">
                    <button class="btn btn-success" onclick="exportSelectedM3U()">
                        <i class="fas fa-download"></i> Export Selected M3U
                    </button>
                    <button class="btn btn-warning" onclick="exportSelectedXtream()">
                        <i class="fas fa-key"></i> Export Selected Xtream
                    </button>
                    <button class="btn btn-vlc" onclick="exportSelectedVLC()">
                        <i class="fas fa-play-circle"></i> Export Selected VLC
                    </button>
                </div>
            </div>
            <div class="table-container">
                <table id="resultsTable">
                    <thead>
                        <tr>
                            <th class="selection-cell">
                                <input type="checkbox" id="selectAll" class="select-all-checkbox" title="Select/Deselect All">
                            </th>
                            <th>Server</th>
                            <th>Category / Channel</th>
                            <th class="sortable" data-sort="type">Type</th>
                            <th class="sortable" data-sort="items">Items</th>
                            <th class="sortable" data-sort="expiry">Expiry</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="resultsBody">
                        <!-- Results will be inserted here -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        let searchData = {
            servers: [],
            keywords: [],
            results: [],
            running: false,
            abortController: null,
            totalServers: 0,
            currentServer: 0,
            matchedItems: {
                live: 0,
                vod: 0,
                series: 0
            },
            selectedItems: new Set(),
            sortColumn: null,
            sortDirection: 'asc'
        };

        async function pasteServers() {
            try {
                const text = await navigator.clipboard.readText();
                document.getElementById('serversInput').value = text;
                showStatus('Servers pasted from clipboard', 'success');
            } catch (err) {
                showStatus('Failed to paste from clipboard', 'error');
            }
        }

        function showStatus(message, type = 'info') {
            const statusEl = document.getElementById('statusMessage');
            const textEl = document.getElementById('statusText');
            
            statusEl.className = `status-message status-${type}`;
            textEl.textContent = message;
            statusEl.style.display = 'flex';
            
            // Auto-hide success messages after 3 seconds
            if (type === 'success') {
                setTimeout(() => {
                    statusEl.style.display = 'none';
                }, 3000);
            }
        }

        function updateProgress(current, total, percent) {
            document.getElementById('progressFill').style.width = `${percent}%`;
            document.getElementById('progressCurrent').textContent = current;
            document.getElementById('progressTotal').textContent = total;
            document.getElementById('progressPercent').textContent = `${percent}%`;
        }

        function updateCounts() {
            document.getElementById('liveCount').textContent = searchData.matchedItems.live;
            document.getElementById('vodCount').textContent = searchData.matchedItems.vod;
            document.getElementById('seriesCount').textContent = searchData.matchedItems.series;
        }

        function extractSingleM3U(line) {
            const text = String(line || '').replace(/&/g, '&');
            const getPhpRx = /https?:\/\/[^\s"'<>]+get\.php\?[^ \n\r"'<>]*/ig;
            const m = text.match(getPhpRx);
            
            if (m && m.length) {
                try {
                    const url = new URL(m[0]);
                    if (url.pathname.includes('get.php')) {
                        const user = url.searchParams.get('username');
                        const pass = url.searchParams.get('password');
                        if (user && pass) {
                            return `${url.origin}/get.php?username=${encodeURIComponent(user)}&password=${encodeURIComponent(pass)}&type=m3u_plus`;
                        }
                    }
                } catch (e) {}
            }
            
            const s = text.trim();
            if (/,/.test(s)) {
                const parts = s.split(',').map(x => x.trim());
                if (parts.length >= 3 && isValidHost(parts[0])) {
                    return toM3UFromHostUserPass(parts[0], parts[1], parts[2]);
                }
            } else {
                const parts = s.split(/\s+/).filter(Boolean);
                if (parts.length >= 3 && isValidHost(parts[0])) {
                    return toM3UFromHostUserPass(parts[0], parts[1], parts[2]);
                }
            }
            
            return null;
        }

        function isValidHost(host) {
            const hostPattern = /^(?:(?:https?:\/\/)?(?:\d{1,3}(?:\.\d{1,3}){3}|[a-z0-9\-]+(?:\.[a-z0-9\-]+)+)(?::\d{1,5})?)\/?$/i;
            return hostPattern.test(host);
        }

        function toM3UFromHostUserPass(host, user, pass) {
            if (!/^https?:\/\//i.test(host)) host = 'http://' + host;
            return `${host.replace(/\/+$/, '')}/get.php?username=${encodeURIComponent(user)}&password=${encodeURIComponent(pass)}&type=m3u_plus`;
        }

        function m3uToXtreamApi(m3uUrl) {
            try {
                const url = new URL(m3uUrl);
                const base = url.origin;
                const user = url.searchParams.get('username');
                const pass = url.searchParams.get('password');
                if (!user || !pass) return null;
                return { base, user, pass, apiBase: `${base}/player_api.php?username=${encodeURIComponent(user)}&password=${encodeURIComponent(pass)}` };
            } catch {
                return null;
            }
        }

        async function fetchWithTimeout(url, timeout = 10000) {
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), timeout);
            
            try {
                const response = await fetch(url, { signal: controller.signal });
                clearTimeout(timeoutId);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                return response;
            } catch (error) {
                clearTimeout(timeoutId);
                if (error.name === 'AbortError') {
                    throw new Error('Request timed out');
                }
                throw error;
            }
        }

        function matchText(text, keywords, logic, matchType) {
            const t = (text || '').toLowerCase();
            if (!keywords.length) return false;
            
            if (matchType === 'regex') {
                const regexes = [];
                for (const k of keywords) {
                    try {
                        regexes.push(new RegExp(k, 'i'));
                    } catch (e) {
                        console.error(`Invalid regex: ${k}`);
                    }
                }
                if (!regexes.length) return false;
                return logic === 'any' ? regexes.some(rx => rx.test(text)) : regexes.every(rx => rx.test(text));
            } else {
                const searchTerms = keywords.map(k => k.toLowerCase());
                return logic === 'any' ? 
                    searchTerms.some(term => t.includes(term)) : 
                    searchTerms.every(term => t.includes(term));
            }
        }

        function updateExportButtons() {
            const hasSelected = searchData.selectedItems.size > 0;
            document.getElementById('exportButtons').style.display = hasSelected ? 'flex' : 'none';
        }

        function toggleSelectAll() {
            const selectAll = document.getElementById('selectAll');
            const checkboxes = document.querySelectorAll('.item-checkbox');
            const allChecked = selectAll.checked;
            
            checkboxes.forEach(checkbox => {
                checkbox.checked = allChecked;
                const itemId = checkbox.dataset.itemId;
                if (allChecked) {
                    searchData.selectedItems.add(itemId);
                } else {
                    searchData.selectedItems.delete(itemId);
                }
            });
            
            updateExportButtons();
        }

        function toggleItemSelection(checkbox) {
            const itemId = checkbox.dataset.itemId;
            if (checkbox.checked) {
                searchData.selectedItems.add(itemId);
            } else {
                searchData.selectedItems.delete(itemId);
            }
            
            // Update select all checkbox
            const totalCheckboxes = document.querySelectorAll('.item-checkbox').length;
            const checkedCount = document.querySelectorAll('.item-checkbox:checked').length;
            document.getElementById('selectAll').checked = totalCheckboxes > 0 && checkedCount === totalCheckboxes;
            
            updateExportButtons();
        }

        async function startSearch() {
            if (searchData.running) {
                stopSearch();
                return;
            }

            const serversRaw = document.getElementById('serversInput').value.trim();
            const keywordsRaw = document.getElementById('keywordsInput').value.trim();
            
            if (!serversRaw || !keywordsRaw) {
                showStatus('Please enter both servers and keywords', 'error');
                return;
            }

            // Reset state
            searchData = {
                servers: serversRaw.split(/\r?\n/).map(s => s.trim()).filter(Boolean),
                keywords: keywordsRaw.split(/[\n,]+/).map(k => k.trim()).filter(Boolean),
                results: [],
                running: true,
                abortController: new AbortController(),
                totalServers: 0,
                currentServer: 0,
                matchedItems: { live: 0, vod: 0, series: 0 },
                selectedItems: new Set(),
                sortColumn: null,
                sortDirection: 'asc'
            };

            // Show progress
            document.getElementById('progressContainer').style.display = 'block';
            document.getElementById('resultsCount').style.display = 'none';
            document.getElementById('resultsSection').style.display = 'none';
            document.getElementById('exportButtons').style.display = 'none';
            
            // Clear previous results
            document.getElementById('resultsBody').innerHTML = '';
            
            // Update button
            const startBtn = document.querySelector('.btn-primary');
            startBtn.innerHTML = '<i class="fas fa-stop"></i> Stop Search';
            startBtn.className = 'btn btn-danger';
            
            showStatus(`Starting search across ${searchData.servers.length} servers...`, 'loading');

            try {
                const total = searchData.servers.length;
                searchData.totalServers = total;
                
                for (let i = 0; i < total; i++) {
                    if (!searchData.running) break;
                    
                    searchData.currentServer = i + 1;
                    const progress = Math.round(((i + 1) / total) * 100);
                    updateProgress(i + 1, total, progress);
                    
                    const serverLine = searchData.servers[i];
                    showStatus(`Checking server ${i + 1}/${total}: ${serverLine.substring(0, 50)}...`, 'loading');
                    
                    const m3uUrl = extractSingleM3U(serverLine);
                    if (!m3uUrl) {
                        console.log(`Invalid server format: ${serverLine}`);
                        continue;
                    }
                    
                    const xt = m3uToXtreamApi(m3uUrl);
                    if (!xt) {
                        console.log(`Could not extract Xtream credentials from: ${m3uUrl}`);
                        continue;
                    }

                    try {
                        const result = await processServer(xt, searchData.keywords);
                        if (result.matches.length > 0) {
                            searchData.results.push(result);
                        }
                    } catch (error) {
                        console.error(`Error processing server ${xt.base}:`, error);
                    }
                    
                    // Small delay to prevent overwhelming
                    await new Promise(resolve => setTimeout(resolve, 100));
                }

                // Display results
                renderResults();
                
                if (searchData.running) {
                    const totalMatches = searchData.matchedItems.live + searchData.matchedItems.vod + searchData.matchedItems.series;
                    showStatus(`Search completed! Found ${totalMatches} items across ${searchData.results.length} servers`, 'success');
                } else {
                    showStatus('Search stopped by user', 'info');
                }
                
            } catch (error) {
                console.error('Search error:', error);
                showStatus(`Error: ${error.message}`, 'error');
            } finally {
                // Reset button
                const startBtn = document.querySelector('.btn-danger, .btn-primary');
                startBtn.innerHTML = '<i class="fas fa-search"></i> Start Search';
                startBtn.className = 'btn btn-primary';
                searchData.running = false;
            }
        }

        async function processServer(xt, keywords) {
            const searchMode = document.getElementById('searchMode').value;
            const contentType = document.getElementById('contentType').value;
            const keywordLogic = document.getElementById('keywordLogic').value;
            const matchType = document.getElementById('matchType').value;
            
            const result = {
                server: xt.base,
                user: xt.user,
                pass: xt.pass,
                matches: [],
                expiry: 'Unknown',
                serverId: `${xt.base}_${xt.user}_${xt.pass}`
            };

            try {
                // Fetch server info
                const info = await fetchWithTimeout(xt.apiBase).then(r => r.json());
                
                // Extract expiry date
                if (info.user_info?.exp_date) {
                    const exp = info.user_info.exp_date;
                    if (exp && exp !== "0" && exp !== 0) {
                        const n = Number(exp);
                        if (!isNaN(n) && n > 100000) {
                            const d = new Date(n * 1000);
                            result.expiry = d.toLocaleDateString();
                        }
                    }
                }

                // Determine what content types to fetch
                const typesToCheck = [];
                if (['live', 'live_vod', 'all'].includes(contentType)) typesToCheck.push('live');
                if (['vod', 'live_vod', 'all'].includes(contentType)) typesToCheck.push('vod');
                if (['all'].includes(contentType)) typesToCheck.push('series');

                // Fetch data for each type
                for (const type of typesToCheck) {
                    const action = type === 'live' ? 'get_live_streams' : 
                                 type === 'vod' ? 'get_vod_streams' : 'get_series';
                    const catAction = type === 'live' ? 'get_live_categories' : 
                                    type === 'vod' ? 'get_vod_categories' : 'get_series_categories';
                    
                    const [items, categories] = await Promise.all([
                        fetchWithTimeout(`${xt.apiBase}&action=${action}`).then(r => r.json()),
                        fetchWithTimeout(`${xt.apiBase}&action=${catAction}`).then(r => r.json())
                    ]);

                    // Create category map
                    const categoryMap = {};
                    categories.forEach(cat => {
                        categoryMap[cat.category_id] = cat.category_name || 'Unnamed';
                    });

                    if (searchMode === 'channels') {
                        // Search in channel names
                        items.forEach(item => {
                            const name = item.name || item.title || '';
                            const catName = categoryMap[item.category_id] || 'Unnamed';
                            const combined = `${name} ${catName}`;
                            
                            if (matchText(combined, keywords, keywordLogic, matchType)) {
                                const streamId = item.stream_id || item.series_id || item.id;
                                const pathType = type === 'vod' ? 'movie' : type === 'series' ? 'series' : 'live';
                                const ext = item.container_extension || (type === 'series' ? 'mkv' : type === 'vod' ? 'mp4' : 'ts');
                                
                                const itemId = `${result.serverId}_${type}_${name}`;
                                result.matches.push({
                                    type,
                                    label: name,
                                    category: catName,
                                    count: 1,
                                    items: [{
                                        name,
                                        category: catName,
                                        url: `${xt.base}/${pathType}/${xt.user}/${xt.pass}/${streamId}.${ext}`,
                                        ext
                                    }],
                                    itemId: itemId,
                                    expiry: result.expiry
                                });
                                
                                // Update counts
                                searchData.matchedItems[type]++;
                            }
                        });
                    } else {
                        // Search in category names
                        const itemsByCategory = {};
                        items.forEach(item => {
                            const catId = item.category_id || '0';
                            if (!itemsByCategory[catId]) {
                                itemsByCategory[catId] = [];
                            }
                            itemsByCategory[catId].push(item);
                        });

                        Object.entries(itemsByCategory).forEach(([catId, catItems]) => {
                            const catName = categoryMap[catId] || 'Unnamed';
                            
                            if (matchText(catName, keywords, keywordLogic, matchType)) {
                                const categoryItems = catItems.map(item => {
                                    const name = item.name || item.title || '';
                                    const streamId = item.stream_id || item.series_id || item.id;
                                    const pathType = type === 'vod' ? 'movie' : type === 'series' ? 'series' : 'live';
                                    const ext = item.container_extension || (type === 'series' ? 'mkv' : type === 'vod' ? 'mp4' : 'ts');
                                    
                                    return {
                                        name,
                                        category: catName,
                                        url: `${xt.base}/${pathType}/${xt.user}/${xt.pass}/${streamId}.${ext}`,
                                        ext
                                    };
                                });

                                const itemId = `${result.serverId}_${type}_${catName}`;
                                result.matches.push({
                                    type,
                                    label: catName,
                                    category: catName,
                                    count: categoryItems.length,
                                    items: categoryItems,
                                    itemId: itemId,
                                    expiry: result.expiry
                                });
                                
                                // Update counts
                                searchData.matchedItems[type] += categoryItems.length;
                            }
                        });
                    }
                }

            } catch (error) {
                console.error(`Error fetching data from ${xt.base}:`, error);
                throw error;
            }

            return result;
        }

        function sortResults() {
            const allMatches = [];
            searchData.results.forEach(result => {
                result.matches.forEach(match => {
                    allMatches.push({
                        ...match,
                        server: result.server,
                        user: result.user,
                        pass: result.pass
                    });
                });
            });

            allMatches.sort((a, b) => {
                let valA, valB;
                
                switch (searchData.sortColumn) {
                    case 'type':
                        valA = a.type;
                        valB = b.type;
                        break;
                    case 'items':
                        valA = a.count;
                        valB = b.count;
                        break;
                    case 'expiry':
                        valA = a.expiry === 'Unknown' ? '9999-12-31' : a.expiry;
                        valB = b.expiry === 'Unknown' ? '9999-12-31' : b.expiry;
                        break;
                    default:
                        return 0;
                }
                
                if (searchData.sortDirection === 'asc') {
                    return valA < valB ? -1 : valA > valB ? 1 : 0;
                } else {
                    return valA > valB ? -1 : valA < valB ? 1 : 0;
                }
            });

            // Reorganize back into server groups
            const sortedResults = [];
            const serverMap = new Map();
            
            allMatches.forEach(match => {
                const serverKey = `${match.server}_${match.user}_${match.pass}`;
                if (!serverMap.has(serverKey)) {
                    serverMap.set(serverKey, {
                        server: match.server,
                        user: match.user,
                        pass: match.pass,
                        expiry: match.expiry,
                        matches: []
                    });
                }
                serverMap.get(serverKey).matches.push(match);
            });
            
            serverMap.forEach(result => {
                sortedResults.push(result);
            });
            
            searchData.results = sortedResults;
        }

            searchData.results.forEach((result, serverIndex) => {

                    summary.textContent = match.label;
                    
                    const channelsContainer = document.createElement('div');
                    channelsContainer.className = 'channels-container';
                    
                    match.items.forEach((item, itemIndex) => {
                        const channelItem = document.createElement('div');
                        channelItem.className = 'channel-item';
                        
                        const channelInfo = document.createElement('div');
                        channelInfo.className = 'channel-info';

                        channelNumber.className = 'channel-number';
                        channelNumber.textContent = itemIndex + 1;
                        
                        const channelName = document.createElement('div');
                        channelName.className = 'channel-name';
                        channelName.textContent = item.name;
                        
                        const channelActions = document.createElement('div');
                        channelActions.className = 'channel-actions';
                        
                        const playBtn = document.createElement('button');
                        playBtn.className = 'btn-small';
                        playBtn.style.background = '#48bb78';
                        playBtn.style.color = 'white';
                        playBtn.innerHTML = '<i class="fas fa-play"></i>';
                        playBtn.title = 'Play';
                        playBtn.onclick = () => window.open(item.url, '_blank');
                        
                        const copyBtn = document.createElement('button');
                        copyBtn.className = 'btn-small';
                        copyBtn.style.background = '#4299e1';
                        copyBtn.style.color = 'white';
                        copyBtn.innerHTML = '<i class="fas fa-copy"></i>';
                        copyBtn.title = 'Copy URL';
                        copyBtn.onclick = () => {
                            navigator.clipboard.writeText(item.url);
                            showStatus('URL copied to clipboard', 'success');
                        };
                        
                        channelActions.appendChild(playBtn);
                        channelActions.appendChild(copyBtn);
                        
                        channelInfo.appendChild(channelNumber);
                        channelInfo.appendChild(channelName);
                        channelInfo.appendChild(channelActions);
                        channelItem.appendChild(channelInfo);
                        channelsContainer.appendChild(channelItem);
                    });
                    
                    details.appendChild(summary);
                    details.appendChild(channelsContainer);
                    categoryCell.appendChild(details);
                    tr.appendChild(categoryCell);
                    
                    // Type cell
                    const typeCell = document.createElement('td');

                    typeSpan.className = `type-cell type-${match.type}`;

                    typeCell.appendChild(typeSpan);

                    countCell.className = 'count-cell';

                    if (matchIndex === 0) {
                        const expiryCell = document.createElement('td');
                        expiryCell.className = 'expiry-cell';
                        expiryCell.textContent = result.expiry;
                        expiryCell.rowSpan = result.matches.length;
                        tr.appendChild(expiryCell);
                    }
                    
                    // Actions cell
                    const actionsCell = document.createElement('td');
                    actionsCell.className = 'actions-cell';
                    
                    const exportBtn = document.createElement('button');
                    exportBtn.className = 'btn-small';
                    exportBtn.style.background = '#9f7aea';
                    exportBtn.style.color = 'white';
                    exportBtn.innerHTML = '<i class="fas fa-download"></i> VLC';
                    exportBtn.title = 'Export as VLC playlist';
                    exportBtn.onclick = () => exportCategoryVLC(match);
                    
                    const fetchBtn = document.createElement('button');
                    fetchBtn.className = 'btn-small';
                    fetchBtn.style.background = '#ed8936';
                    fetchBtn.style.color = 'white';
                    fetchBtn.innerHTML = '<i class="fas fa-external-link-alt"></i> Open';
                    fetchBtn.title = 'Open server in new tab';
                    fetchBtn.onclick = () => {
                        const m3uUrl = `${result.server}/get.php?username=${encodeURIComponent(result.user)}&password=${encodeURIComponent(result.pass)}&type=m3u_plus`;
                        window.open(m3uUrl, '_blank');
                    };
                    
                    actionsCell.appendChild(exportBtn);
                    actionsCell.appendChild(fetchBtn);
                    tr.appendChild(actionsCell);
                    
                    resultsBody.appendChild(tr);
                });
            });
            
            // Setup select all checkbox
            document.getElementById('selectAll').onchange = toggleSelectAll;
            
            // Update counts display
            updateCounts();
            document.getElementById('resultsCount').style.display = 'block';
            document.getElementById('resultsSection').style.display = 'block';
            document.getElementById('progressContainer').style.display = 'none';
            
            // Update export buttons based on selection
            updateExportButtons();
        }

        function setupSorting() {
            document.querySelectorAll('th[data-sort]').forEach(th => {
                th.addEventListener('click', () => {
                    const column = th.dataset.sort;
                    
                    if (searchData.sortColumn === column) {
                        // Toggle direction
                        searchData.sortDirection = searchData.sortDirection === 'asc' ? 'desc' : 'asc';
                    } else {
                        // New column, default to ascending
                        searchData.sortColumn = column;
                        searchData.sortDirection = 'asc';
                    }
                    
                    renderResults();
                });
            });
        }

        function stopSearch() {
            if (searchData.running) {
                searchData.running = false;
                if (searchData.abortController) {
                    searchData.abortController.abort();
                }
                showStatus('Stopping search...', 'info');
            }
        }

            document.getElementById('keywordsInput').value = '';
            document.getElementById('resultsBody').innerHTML = '';
            document.getElementById('resultsCount').style.display = 'none';
            document.getElementById('resultsSection').style.display = 'none';
            document.getElementById('progressContainer').style.display = 'none';
            document.getElementById('exportButtons').style.display = 'none';

                servers: [],
                keywords: [],

        function exportCategoryVLC(match) {
            if (!match.items || match.items.length === 0) {
                showStatus('No items to export', 'error');
                return;
            }

            let m3uContent = '#EXTM3U\n';
            match.items.forEach(item => {
                m3uContent += `#EXTINF:-1,${item.name}\n`;
                m3uContent += `${item.url}\n`;
            });

            const safeLabel = match.label.replace(/[^a-zA-Z0-9]/g, '_').toLowerCase();
            const filename = `VLC_${safeLabel}_${match.items.length}_${match.type}.m3u`;

            const blob = new Blob([m3uContent], { type: 'audio/x-mpegurl' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);

            showStatus(`VLC playlist saved as ${filename}`, 'success');
        }

        function exportSelectedM3U() {
            if (searchData.selectedItems.size === 0) {
                showStatus('No items selected for export', 'error');
                return;
            }

            let content = '';
            const seenServers = new Set();
            
            searchData.results.forEach(result => {
                result.matches.forEach(match => {
                    if (searchData.selectedItems.has(match.itemId)) {
                        const serverKey = `${result.server}\n${result.user}`;
                        if (!seenServers.has(serverKey)) {
                            seenServers.add(serverKey);
                            const m3uUrl = `${result.server}/get.php?username=${encodeURIComponent(result.user)}&password=${encodeURIComponent(result.pass)}&type=m3u_plus`;
                            content += `${m3uUrl}\nExpiry: ${result.expiry}\n\n`;
                        }
                    }
                });
            });

            const filename = `IPTV_Finder_Selected_M3U_${new Date().toISOString().slice(0,10)}.txt`;
            downloadFile(content, filename, 'text/plain');
        }

        function exportSelectedXtream() {
            if (searchData.selectedItems.size === 0) {
                showStatus('No items selected for export', 'error');
                return;
            }

            let content = '';
            const seenServers = new Set();
            
            searchData.results.forEach(result => {
                result.matches.forEach(match => {
                    if (searchData.selectedItems.has(match.itemId)) {
                        const serverKey = `${result.server}\n${result.user}`;
                        if (!seenServers.has(serverKey)) {
                            seenServers.add(serverKey);
                            content += `Host: ${result.server}\n`;
                            content += `Username: ${result.user}\n`;
                            content += `Password: ${result.pass}\n`;
                            if (result.expiry !== 'Unknown') {
                                content += `Expiry: ${result.expiry}\n`;
                            }
                            content += '=====================================\n\n';
                        }
                    }
                });
            });

            const filename = `IPTV_Finder_Selected_Xtream_${new Date().toISOString().slice(0,10)}.txt`;
            downloadFile(content, filename, 'text/plain');
        }

        function exportSelectedVLC() {
            if (searchData.selectedItems.size === 0) {
                showStatus('No items selected for export', 'error');
                return;
            }

            let m3uContent = '#EXTM3U\n';
            const addedUrls = new Set();
            
            searchData.results.forEach(result => {
                result.matches.forEach(match => {
                    if (searchData.selectedItems.has(match.itemId)) {
                        match.items.forEach(item => {
                            if (!addedUrls.has(item.url)) {
                                addedUrls.add(item.url);
                                m3uContent += `#EXTINF:-1,${match.label} - ${item.name}\n`;
                                m3uContent += `${item.url}\n`;
                            }
                        });
                    }
                });
            });

            const filename = `IPTV_Finder_Selected_VLC_${new Date().toISOString().slice(0,10)}.m3u`;
            const blob = new Blob([m3uContent], { type: 'audio/x-mpegurl' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);

            showStatus(`Selected VLC playlist saved as ${filename}`, 'success');
        }

        function downloadFile(content, filename, mimeType) {
            const blob = new Blob([content], { type: mimeType });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            
            showStatus(`Exported ${filename} with ${searchData.selectedItems.size} selected items`, 'success');
        }

        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            // Ctrl/Cmd + Enter to start search
            if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
                e.preventDefault();
                startSearch();
            }
            
            // Escape to clear
            if (e.key === 'Escape') {
                clearAll();
            }
        });

        // Initialize
        showStatus('Enter servers (one per line) and keywords to start searching', 'info');
        setupSorting();
    </script>
</body>
</html>
